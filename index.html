<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Space+Mono&family=Dancing+Script:wght@700&display=swap"
            rel="stylesheet"
        />
        <title>Portfolio Website</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
        <script>
            ;(function () {
                const stored = localStorage.getItem('theme-preference')
                const prefersDark = window.matchMedia(
                    '(prefers-color-scheme: dark)'
                ).matches
                const isDark =
                    stored === 'true' || (stored === null && prefersDark)

                if (isDark) {
                    document.documentElement.classList.add('dark')
                }
            })()
        </script>
    </body>
</html>
